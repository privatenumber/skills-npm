catalogMode: prefer

ignoreWorkspaceRootCheck: true

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver@6.3.1
  - undici-types@6.21.0
  - langium@3.3.1
packages:
  - playground
  - docs
  - packages/*
  - examples/*
catalogs:
  dev:
    '@antfu/eslint-config': ^7.7.3
    '@antfu/ni': ^30.0.0
    baseline-browser-mapping: ^2.10.10
    bumpp: ^11.0.1
    eslint: ^10.1.0
    lint-staged: ^16.4.0
    publint: ^0.3.18
    simple-git: ^3.33.0
    simple-git-hooks: ^2.13.1
    tsdown: ^0.17.3
    tsx: ^4.21.0
    typescript: ^6.0.2
    vite: ^8.0.3
  examples:
    '@slidev/cli': ^52.14.1
  inlined:
    '@antfu/utils': ^9.3.0
  prod:
    '@clack/prompts': ^1.1.0
    cac: ^7.0.0
    gray-matter: ^4.0.3
    picocolors: ^1.1.1
    tinyglobby: ^0.2.15
    unconfig: ^7.5.0
    xdg-basedir: ^5.1.0
    yaml: ^2.8.3
  testing:
    tinyexec: ^1.0.4
    vitest: ^4.1.1
    vitest-package-exports: ^1.2.0
  types:
    '@types/node': ^25.5.0
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
